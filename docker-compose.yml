version: "3.9"

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: hng-nextcloud
    restart: unless-stopped
    volumes:
      - nextcloud_data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    networks:
      - hng-network

  nginx:
    image: nginx:alpine
    container_name: hng-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    networks:
      - hng-network
    depends_on:
      - nextcloud

  detector:
    build: ./detector
    container_name: hng-detector
    restart: unless-stopped
    # host networking required so iptables rules affect the HOST, not just container
    network_mode: host
    # NET_ADMIN required for iptables
    cap_add:
      - NET_ADMIN
    privileged: true
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - ./logs:/app/logs
    environment:
      - SLACK_WEBHOOK=${SLACK_WEBHOOK}
    depends_on:
      - nginx

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  nextcloud_data:

networks:
  hng-network:
    driver: bridge
