events {
    worker_connections 1024;
}

http {
    # Trust X-Forwarded-For from all sources (adjust CIDRs for production)
    real_ip_header    X-Forwarded-For;
    set_real_ip_from  0.0.0.0/0;
    real_ip_recursive on;

    # JSON access log with all required fields
    log_format json_logs escape=json
    '{'
        '"source_ip":"$http_x_forwarded_for",'
        '"timestamp":"$time_iso8601",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"response_size":$body_bytes_sent,'
        '"user_agent":"$http_user_agent",'
        '"request_time":$request_time'
    '}';

    access_log /var/log/nginx/hng-access.log json_logs;

    server {
        listen 80;
        client_max_body_size 512M;

        # Nextcloud proxy
        location / {
            proxy_pass         http://hng-nextcloud:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Nextcloud well-known redirects
        location /.well-known/carddav {
            return 301 $scheme://$host/remote.php/dav;
        }
        location /.well-known/caldav {
            return 301 $scheme://$host/remote.php/dav;
        }
    }
}
