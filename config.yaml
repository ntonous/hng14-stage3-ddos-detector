# ===============================
# HNG Stage 3 DDOS Detector Config
# ===============================

# -------------------------------
# LOG SETTINGS
# -------------------------------
log_file: "/var/log/nginx/hng-access.log"

# Sliding window (seconds)
window_seconds: 60

# -------------------------------
# BASELINE SETTINGS
# -------------------------------
baseline:
  window_minutes: 30          # rolling learning window
  recalc_interval: 60         # seconds
  min_samples: 10             # minimum samples before trusting baseline

  # Floor values (prevents zero / unstable baseline)
  floor_mean: 1
  floor_std: 0.5

# -------------------------------
# DETECTION THRESHOLDS
# -------------------------------
detection:
  zscore_threshold: 3.0
  multiplier_threshold: 5

# Error surge tightening
error_detection:
  enabled: true
  multiplier: 3

# -------------------------------
# BLOCKING SETTINGS
# -------------------------------
blocking:
  # Backoff schedule in seconds:
  # 10min → 30min → 2hr → permanent (0 = permanent)
  backoff_schedule: [600, 1800, 7200, 0]
  max_bans: 4

# -------------------------------
# DASHBOARD SETTINGS
# -------------------------------
dashboard:
  host: "0.0.0.0"
  port: 9000
  refresh_seconds: 3
  public_url: "http://metrics.ntscomputers.dpdns.org"

# -------------------------------
# SERVER INFO
# -------------------------------
server:
  ip: "52.233.247.107"

# -------------------------------
# SLACK CONFIG (SECURE)
# -------------------------------
slack:
  webhook_url: ""     # ⚠️ MUST be set via environment variable
  enabled: true

# -------------------------------
# AUDIT LOG
# -------------------------------
audit_log: "/app/logs/audit.log"
